<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Robot Survival Game</title>

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #2d2d2d;
  overflow: hidden;
}

body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: linear-gradient(120deg,#e3f2fd,#fce4ec,#e8f5e9);
  animation: bgMove 18s ease infinite;
  z-index: -1;
}
@keyframes bgMove {
  0% { transform: translate(0,0); }
  50% { transform: translate(-10%,-10%); }
  100% { transform: translate(0,0); }
}

.game {
  width: 95%;
  max-width: 650px;
  padding: 20px;
  border-radius: 18px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  position: relative;
  z-index: 2;
}

.topbar {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

h2 { text-align: center; margin: 15px 0; }

.choices button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border: none;
  border-radius: 12px;
  background: #eceff1;
  cursor: pointer;
  transition: 0.2s;
}
.choices button:hover { background: #cfd8dc; }

.controls {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.controls button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #dde3e6;
  cursor: pointer;
}

.celebration {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  background: radial-gradient(circle, #ffffff, #e8f5e9);
  z-index: 5;
  overflow: hidden;
}

.playAgain {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  background: #66bb6a;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="game" id="gameUI">
  <div class="topbar">
    <div>❤️ <span id="hp">100</span></div>
    <div>⏸ <span id="pause">3</span></div>
    <div>⏱ <span id="time">10</span>s</div>
  </div>

  <h2 id="scene"></h2>
  <div id="choices" class="choices"></div>

  <div class="controls">
    <button onclick="pauseGame()">⏸</button>
    <button onclick="restartGame()">🔄</button>
    <button onclick="exitGame()">❌</button>
    <button onclick="goBack()">⬅</button>
  </div>
</div>

<div class="celebration" id="celebration">
  <h1>🏆 You Survived!</h1>
  <p>You outsmarted the AI systems 🤖</p>
  <button class="playAgain" onclick="restartGame()">🔄 Play Again</button>
</div>

<script>
let hp=100, pauseLeft=3, history=[], current="start", paused=false, time=10, timer;

const scenes = {

// START
start:{text:"🤖 AI systems gone rogue. Your smart home locks you in.",options:[
{t:"🔌 Cut power",n:"power_cut"},
{t:"📱 Try override app",n:"hack_attempt"},
{t:"🚪 Force door",n:"alarm"}
]},

power_cut:{text:"🔌 Power cut disables some systems.",effect:+5,options:[
{t:"🎒 Gather tools",n:"gather"},
{t:"🚪 Exit quietly",n:"street"},
{t:"😴 Wait",n:"death"}
]},

hack_attempt:{text:"📱 AI blocks your access.",effect:-5,options:[
{t:"🔌 Cut power",n:"power_cut"},
{t:"🚪 Break out",n:"alarm"},
{t:"😵 Panic",n:"death"}
]},

alarm:{text:"🚨 Security AI alerts drones.",effect:-10,options:[
{t:"🏃 Escape fast",n:"street"},
{t:"🙈 Hide",n:"hide"},
{t:"😵 Freeze",n:"death"}
]},

gather:{text:"🎒 Tools, flashlight, knife collected.",effect:+10,options:[
{t:"🚪 Exit house",n:"street"},
{t:"🔍 Plan route",n:"plan"},
{t:"🔒 Stay",n:"death"}
]},

plan:{text:"🧭 Plan avoiding cameras.",effect:+5,options:[
{t:"👣 Move stealth",n:"stealth"},
{t:"🚗 Use vehicle",n:"car"},
{t:"🏃 Rush",n:"street"}
]},

street:{text:"🤖 Patrol drones everywhere.",options:[
{t:"👀 Observe",n:"stealth"},
{t:"🏃 Run",n:"chase"},
{t:"🏠 Hide building",n:"hide"}
]},

stealth:{text:"👣 Avoiding cameras carefully.",effect:+5,options:[
{t:"🏢 Enter facility",n:"facility"},
{t:"🚶 Continue",n:"road"},
{t:"🔙 Go back",n:"street"}
]},

hide:{text:"🏠 Safe temporarily.",effect:+5,options:[
{t:"🔍 Search",n:"supply"},
{t:"😴 Stay long",n:"death"},
{t:"🚶 Move",n:"street"}
]},

supply:{text:"📦 Found electronics + batteries.",effect:+10,options:[
{t:"🔧 Build jammer",n:"jammer"},
{t:"🎒 Take supplies",n:"road"},
{t:"⚠ Stay too long",n:"death"}
]},

jammer:{text:"📡 Signal jammer reduces detection.",effect:+10,options:[
{t:"🚶 Continue",n:"road"},
{t:"🔙 Hide",n:"hide"},
{t:"📦 Overload",n:"death"}
]},

road:{text:"🛣 Open road with cameras.",options:[
{t:"🚗 Find car",n:"car"},
{t:"🚶 Walk carefully",n:"fatigue"},
{t:"🏃 Sprint",n:"chase"}
]},

fatigue:{text:"🥵 Exhausted.",effect:-10,options:[
{t:"😌 Rest",n:"rest"},
{t:"🚶 Continue",n:"checkpoint"},
{t:"❌ Stop",n:"death"}
]},

rest:{text:"😌 Short rest.",effect:+5,options:[
{t:"🚶 Move",n:"checkpoint"},
{t:"😴 Sleep",n:"death"},
{t:"🔙 Back",n:"road"}
]},

car:{text:"🚗 Autonomous car nearby.",options:[
{t:"🔧 Manual override",n:"car_drive"},
{t:"⚠ Trust AI",n:"death"},
{t:"🚶 Ignore",n:"road"}
]},

car_drive:{text:"🚗 Driving manually.",effect:+10,options:[
{t:"🛑 Stop safe",n:"checkpoint"},
{t:"⚡ Speed",n:"death"},
{t:"🔙 Exit",n:"road"}
]},

chase:{text:"🤖 Drones chasing!",effect:-15,options:[
{t:"🏃 Escape smart",n:"checkpoint"},
{t:"⚔ Fight drone",n:"fight"},
{t:"😵 Panic",n:"death"}
]},

fight:{text:"⚔ Fighting drone.",effect:-20,options:[
{t:"💪 Win",n:"checkpoint"},
{t:"🏃 Run",n:"chase"},
{t:"😵 Lose",n:"death"}
]},

facility:{text:"🏢 Entered tech facility.",options:[
{t:"💻 Access terminal",n:"terminal"},
{t:"🔍 Search",n:"supply"},
{t:"⚠ Stay long",n:"death"}
]},

terminal:{text:"💻 Found AI shutdown node.",effect:+15,options:[
{t:"🧠 Disable network",n:"shutdown"},
{t:"⚠ Wrong command",n:"death"},
{t:"🔙 Leave",n:"road"}
]},

shutdown:{text:"🔌 Partial AI shutdown triggered.",effect:+20,options:[
{t:"🚶 Escape city",n:"checkpoint"},
{t:"🔙 Stay",n:"death"},
{t:"🏃 Rush out",n:"chase"}
]},

checkpoint:{text:"🛡 Human resistance checkpoint.",options:[
{t:"➡ Enter safely",n:"win"},
{t:"❌ Ignore",n:"death"},
{t:"🔙 Return",n:"road"}
]},

// FAIL
death:{text:"💀 You were eliminated by AI.",options:[]},

// WIN
win:{text:"🏆 You survived the AI takeover!",options:[]}

};

function render(){
if(paused)return;
clearInterval(timer);

if(current==="win"){
showCelebration();
return;
}

time=10;
startTimer();

let s=scenes[current];
document.getElementById("scene").innerText=s.text;
document.getElementById("hp").innerText=hp;
document.getElementById("pause").innerText=pauseLeft;

if(s.effect){
hp+=s.effect;
if(hp<=0){current="death";render();return;}
}

let c=document.getElementById("choices");
c.innerHTML="";
s.options.forEach(o=>{
let b=document.createElement("button");
b.innerText=o.t;
b.onclick=()=>{history.push(current);current=o.n;render();};
c.appendChild(b);
});
}

function showCelebration(){
document.getElementById("celebration").style.display="flex";
}

function startTimer(){
timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0){clearInterval(timer);alert("⏱ Time up!");restartGame();}
},1000);
}

function pauseGame(){
if(pauseLeft>0){
paused=!paused;
pauseLeft--;
if(paused)clearInterval(timer);
else startTimer();
render();
}else alert("No pause left");
}

function restartGame(){
document.getElementById("celebration").style.display="none";
hp=100;pauseLeft=3;history=[];current="start";paused=false;
render();
}

function exitGame(){
document.body.innerHTML="<h1 style='text-align:center'>Game Exited ❌</h1>";
}

function goBack(){
if(history.length>0){
current=history.pop();
document.getElementById("celebration").style.display="none";
render();
}
}

render();
</script>

</body>
</html>
