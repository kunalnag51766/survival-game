<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survival Game Hub</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
  overflow: hidden;
}

/* Welcome Screen */
#welcome {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  animation: fadeOut 2.5s forwards;
}

@keyframes fadeOut {
  0% {opacity: 1;}
  80% {opacity: 1;}
  100% {opacity: 0; visibility: hidden;}
}

/* Menu */
#menu {
  display: none;
  padding: 15px;
  height: 100vh;
  overflow-y: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.game-btn {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.game-btn:hover {
  background: #333;
}

/* Game Viewer */
#gameView {
  display: none;
  height: 100vh;
  position: relative;
}

#gameFrame {
  width: 100%;
  height: 100%;
  border: none;
}

.back-btn {
  position: absolute;
  top: 10px;
  left: 10px;
  background: #222;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  z-index: 10;
}
</style>
</head>

<body>

<!-- Welcome -->
<div id="welcome">Welcome Survivor...</div>

<!-- Menu -->
<div id="menu">
  <h2 style="margin-bottom:10px;">Choose Your Survival</h2>
  <div class="grid">

    <!-- 🔥 PUT YOUR GAME URLs HERE -->
    <div class="game-btn" onclick="openGame(GAMES.zombie)">🧟 Zombie Attack</div>
    <div class="game-btn" onclick="openGame(GAMES.alien)">👽 Alien Invasion</div>
    <div class="game-btn" onclick="openGame(GAMES.nuclear)">☢️ Nuclear Attack</div>
    <div class="game-btn" onclick="openGame(GAMES.last)">🧍 Last Human</div>
    <div class="game-btn" onclick="openGame(GAMES.ai)">🤖 AI Takeover</div>
    <div class="game-btn" onclick="openGame(GAMES.cyclone)">🌪 Cyclone</div>
    <div class="game-btn" onclick="openGame(GAMES.ice)">❄️ Ice Age</div>
    <div class="game-btn" onclick="openGame(GAMES.heat)">🔥 Heat Wave</div>
    <div class="game-btn" onclick="openGame(GAMES.emp)">📡 EMP Collapse</div>
    <div class="game-btn" onclick="openGame(GAMES.food)">🍞 Food Crisis</div>
    <div class="game-btn" onclick="openGame(GAMES.flood)">🌊 Flood</div>
    <div class="game-btn" onclick="openGame(GAMES.virus)">🦠 Virus Quarantine</div>

  </div>
</div>

<!-- Game Viewer -->
<div id="gameView">
  <div class="back-btn" onclick="goBack()">⬅ Back</div>
  <iframe id="gameFrame"></iframe>
</div>

<script>
// ================== 🔥 ADD YOUR GAME LINKS HERE ==================
const GAMES = {
  zombie: "game/zombie.html",
  alien: "game/alien.html",
  nuclear: "game/nuclear.html",
  last: "game/last.html",
  ai: "game/ai.html",
  cyclone: "game/cyclone.html",
  ice: "game/ice.html",
  heat: "game/heat.html",
  emp: "game/emp.html",
  food: "game/food.html",
  flood: "game/flood.html",
  virus: "game/virus.html"
};
// ================================================================

// Show menu after welcome
setTimeout(() => {
  document.getElementById("menu").style.display = "block";
}, 2500);

// Open Game
function openGame(url) {
  document.getElementById("menu").style.display = "none";
  document.getElementById("gameView").style.display = "block";
  document.getElementById("gameFrame").src = url;
}

// Back to menu
function goBack() {
  document.getElementById("gameView").style.display = "none";
  document.getElementById("menu").style.display = "block";
  document.getElementById("gameFrame").src = "";
}
</script>

</body>
</html>
