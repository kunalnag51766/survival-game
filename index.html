<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survival Game Hub</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }

body {
  background:#0a0a0a;
  color:white;
  overflow:hidden;
}

#welcome {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:2rem;
  animation:fadeOut 2.5s forwards;
}

@keyframes fadeOut {
  0%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0;visibility:hidden;}
}

#menu {
  display:none;
  padding:15px;
  height:100vh;
  overflow-y:auto;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.game-btn {
  position:relative;
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:.3s;
}

.game-btn:hover { background:#333; }

.tick {
  position:absolute;
  top:8px;
  right:10px;
  font-size:18px;
  color:#00ff88;
  display:none;
}

#gameView {
  display:none;
  height:100vh;
  position:relative;
}

#gameFrame {
  width:100%;
  height:100%;
  border:none;
}

.back-btn {
  position:absolute;
  top:10px;
  left:10px;
  background:#222;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  z-index:10;
}
</style>
</head>

<body>

<div id="welcome">Welcome Survivor...</div>

<div id="menu">
  <h2 style="margin-bottom:10px;">Choose Your Survival</h2>
  <div class="grid">

    <div class="game-btn" id="zombieBtn" onclick="openGame('zombie')">🧟 Zombie <span class="tick">✔</span></div>
    <div class="game-btn" id="alienBtn" onclick="openGame('alien')">👽 Alien <span class="tick">✔</span></div>
    <div class="game-btn" id="nuclearBtn" onclick="openGame('nuclear')">☢️ Nuclear <span class="tick">✔</span></div>
    <div class="game-btn" id="lastBtn" onclick="openGame('last')">🧍 Last Human <span class="tick">✔</span></div>
    <div class="game-btn" id="aiBtn" onclick="openGame('ai')">🤖 AI <span class="tick">✔</span></div>
    <div class="game-btn" id="cycloneBtn" onclick="openGame('cyclone')">🌪 Cyclone <span class="tick">✔</span></div>
    <div class="game-btn" id="iceBtn" onclick="openGame('ice')">❄️ Ice <span class="tick">✔</span></div>
    <div class="game-btn" id="heatBtn" onclick="openGame('heat')">🔥 Heat <span class="tick">✔</span></div>
    <div class="game-btn" id="empBtn" onclick="openGame('emp')">📡 EMP <span class="tick">✔</span></div>
    <div class="game-btn" id="foodBtn" onclick="openGame('food')">🍞 Food <span class="tick">✔</span></div>
    <div class="game-btn" id="floodBtn" onclick="openGame('flood')">🌊 Flood <span class="tick">✔</span></div>
    <div class="game-btn" id="virusBtn" onclick="openGame('virus')">🦠 Virus <span class="tick">✔</span></div>

  </div>
</div>

<div id="gameView">
  <div class="back-btn" onclick="goBack()">⬅ Back</div>
  <iframe id="gameFrame"></iframe>
</div>

<script>
const GAMES = {
  zombie:"game/zombie.html",
  alien:"game/alien.html",
  nuclear:"game/nuclear.html",
  last:"game/last.html",
  ai:"game/ai.html",
  cyclone:"game/cyclone.html",
  ice:"game/ice.html",
  heat:"game/heat.html",
  emp:"game/emp.html",
  food:"game/food.html",
  flood:"game/flood.html",
  virus:"game/virus.html"
};

let currentGame = null;

setTimeout(()=>{
  document.getElementById("menu").style.display="block";
},2500);

function openGame(name){
  currentGame = name;
  document.getElementById("menu").style.display="none";
  document.getElementById("gameView").style.display="block";
  document.getElementById("gameFrame").src = GAMES[name];
}

function goBack(){
  document.getElementById("gameView").style.display="none";
  document.getElementById("menu").style.display="block";
  document.getElementById("gameFrame").src="";
}

/* ✅ ROBUST LISTENER */
window.addEventListener("message",(e)=>{
  console.log("Message received:", e.data);

  // Accept multiple formats
  if(
    e.data === "WIN" ||
    e.data === "win" ||
    (typeof e.data === "object" && e.data.type === "WIN")
  ){
    markWin(currentGame);
  }
});

function markWin(game){
  if(!game) return;

  const btn = document.getElementById(game+"Btn");
  if(btn){
    btn.querySelector(".tick").style.display="inline";
  }
}
</script>

</body>
</html>
